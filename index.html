<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Vault</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ============ GATE: 10 password screens ============ -->
  <main id="gate" class="gate">
    <div class="progress">
      <div class="progress__fill" id="progressFill"></div>
    </div>
    <p class="progress__label" id="progressLabel">Stage 1 / 10</p>

    <div id="screenHost" class="screen-host"></div>

    <div class="lockout" id="lockout" hidden>
      <p>Too many attempts</p>
      <p id="lockoutTimer" class="lockout__timer"></p>
    </div>
  </main>

  <!-- ============ Vault opening animation ============ -->
  <div id="opening" class="opening" hidden>
    <div class="opening__door opening__door--l"></div>
    <div class="opening__door opening__door--r"></div>
  </div>

  <!-- ============ Photo vault ============ -->
  <main id="vault" class="vault" hidden>
    <header class="vault__bar">
      <span class="vault__title">Vault</span>
      <div class="vault__actions">
        <label class="btn btn--sm">
          + Add
          <input type="file" id="uploadInput" accept="image/*,video/*" multiple hidden />
        </label>
      </div>
    </header>

    <div class="toolbar">
      <div class="chips" id="albumChips">
        <button class="chip chip--active" data-album="all">All</button>
        <button class="chip" data-album="favorites">★ Favorites</button>
        <!-- user albums injected here -->
        <button class="chip chip--new" id="newAlbumChip">+ Album</button>
      </div>
    </div>

    <div class="upload-bar" id="uploadBar" hidden>
      <div class="upload-bar__fill" id="uploadBarFill"></div>
    </div>

    <section class="grid" id="grid"></section>
    <p class="empty" id="empty" hidden>No photos yet. Tap + Add.</p>
  </main>

  <!-- ============ Fullscreen viewer ============ -->
  <div id="viewer" class="viewer" hidden>
    <div class="viewer__topbar viewer__topbar--left">
      <button class="viewer__icon-btn" id="viewerFavorite" aria-label="Favorite">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      </button>
      <button class="viewer__icon-btn" id="viewerDownload" aria-label="Download">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      </button>
    </div>
    <div class="viewer__topbar viewer__topbar--right">
      <button class="viewer__icon-btn" id="viewerDelete" aria-label="Delete">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
      </button>
      <button class="viewer__icon-btn" id="viewerClose" aria-label="Close">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <button class="viewer__nav viewer__nav--prev" id="viewerPrev" aria-label="Previous">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>

    <div class="viewer__stage" id="viewerStage">
      <img class="viewer__img" id="viewerImg" alt="" draggable="false" />
      <video class="viewer__video" id="viewerVideo" playsinline controls hidden></video>
    </div>

    <button class="viewer__nav viewer__nav--next" id="viewerNext" aria-label="Next">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>

  <!-- ============ Grid multi-select bar (long-press a photo to trigger) ============ -->
  <div id="selectionBar" class="selection-bar" hidden>
    <span id="selectionCount">0 selected</span>
    <div class="selection-bar__actions">
      <button class="chip-btn" id="selectionAll">Select all</button>
      <button class="chip-btn" id="selectionMove">Move</button>
      <button class="chip-btn chip-btn--danger" id="selectionDelete">Delete</button>
      <button class="chip-btn" id="selectionCancel">Cancel</button>
    </div>
  </div>

  <!-- ============ Album picker sheet (used by "Move" and "+ Album") ============ -->
  <div id="sheet" class="sheet" hidden>
    <div class="sheet__backdrop" id="sheetBackdrop"></div>
    <div class="sheet__panel">
      <h3 class="sheet__title" id="sheetTitle">Move to album</h3>
      <div class="sheet__list" id="sheetList"></div>
      <form id="newAlbumForm" class="sheet__new-album" hidden>
        <input type="text" id="newAlbumName" class="text-input" placeholder="Album name" autocomplete="off" />
        <button type="submit" class="btn btn--sm">Create</button>
      </form>
      <button class="btn btn--ghost" id="sheetCancel">Cancel</button>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
